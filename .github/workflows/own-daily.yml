name: OWN Daily Report

on:
  schedule:
    - cron: "0 4 * * *"   # 9:30 AM IST every day (30 min after FoodPharmer run)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APIFY_TOKEN:     ${{ secrets.APIFY_TOKEN }}
      GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
      GMAIL_USER:      ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASS:  ${{ secrets.GMAIL_APP_PASS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        working-directory: own_scorer
        run: python scraper.py

      - name: Commit updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add own_scorer/history_own.json \
                  own_scorer/followers_own.json \
                  own_scorer/snapshots_own.json
          git diff --cached --quiet || git commit -m "chore: update own_scorer history [skip ci]"
          git push
